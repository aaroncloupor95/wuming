function reasonText(r) {
  const parts = [];
  if (r.margin_chg && Math.abs(r.margin_chg) > 0.5) parts.push('融资'+(r.margin_chg>0?'增':'减')+Math.abs(r.margin_chg).toFixed(1)+'%');
  if (r.main_pct && Math.abs(r.main_pct) > 1) parts.push('主力'+(r.main_pct>0?'流入':'流出')+Math.abs(r.main_pct).toFixed(1)+'%');
  if (r.amplitude && r.amplitude > 4) parts.push('振幅'+r.amplitude.toFixed(1)+'%');
  if (r.roc10 && Math.abs(r.roc10) > 5) parts.push('ROC10 '+r.roc10.toFixed(1)+'%');
  if (r.k_val && (r.k_val < 25 || r.k_val > 75)) parts.push('KDJ-K '+r.k_val.toFixed(0));
  if (r.rsi_val && (r.rsi_val < 35 || r.rsi_val > 65)) parts.push('RSI '+r.rsi_val.toFixed(0));
  return parts.join(' | ') || '综合信号';
}

function render() {
  const dirNames = {UP:'上涨',UP_WEAK:'偏涨',DOWN:'下跌',DOWN_WEAK:'偏跌',NEUTRAL:'方向不明'};
  const levelNames = {VERY_HIGH:'🔥 极强',HIGH:'🟢 强',MID:'🟡 中等',LOW:'🔵 弱',NONE:'⚪ 无'};
  
  // Today close
  document.getElementById('today-close').innerHTML = TODAY.close + ' <span class="today-date">'+TODAY.date+' 收盘</span>';
  
  // Today cards
  const cards = document.getElementById('today-cards');
  ['d1','d3','d5'].forEach(h => {
    const p = TODAY[h]; if (!p) return;
    const d = p.direction;
    const c = d.startsWith('UP') ? '#ef4444' : (d.startsWith('DOWN') ? '#10b981' : '#6b7280');
    const icon = d.startsWith('UP') ? '📈' : (d.startsWith('DOWN') ? '📉' : '➖');
    cards.innerHTML += '<div class="pc">'+
      '<div class="pdate">'+p.date_label+'</div>'+
      '<div class="pdir" style="color:'+c+'">'+icon+' '+dirNames[d]+'</div>'+
      '<div class="ptarget">🎯 目标价 <span style="color:'+c+';font-size:1.3em;font-weight:800">'+p.target+'</span></div>'+
      '<div class="pband">📏 '+p.low+' ~ '+p.high+' (±'+(p.band/2).toFixed(1)+'%)</div>'+
      '<div class="preason">'+reasonText(TODAY)+'</div>'+
      '<div class="plevel">'+levelNames[p.level]+' · 置信'+p.conf+'%</div>'+
    '</div>';
  });

  // Stats
  const s = document.getElementById('stats');
  const n = DATA.length;
  let d1c=0,d1t=0,d3c=0,d3t=0,d5c=0,d5t=0;
  let d1errs=[],d3errs=[],d5errs=[];
  
  DATA.forEach(r => {
    if (r.d1.pred !== 'NEUTRAL') {
      d1t++;
      if ((r.d1.pred.startsWith('UP') && r.d1.actual_chg > 0) || (r.d1.pred.startsWith('DOWN') && r.d1.actual_chg < 0)) d1c++;
    }
    if (r.d1.pred_target) d1errs.push(Math.abs(r.d1.actual_chg - (r.d1.pred_target - r.close)/r.close*100));
    if (r.d3 && r.d3.pred !== 'NEUTRAL' && r.d3.actual_chg !== null) {
      d3t++;
      if ((r.d3.pred.startsWith('UP') && r.d3.actual_chg > 0) || (r.d3.pred.startsWith('DOWN') && r.d3.actual_chg < 0)) d3c++;
    }
    if (r.d5 && r.d5.pred !== 'NEUTRAL' && r.d5.actual_chg !== null) {
      d5t++;
      if ((r.d5.pred.startsWith('UP') && r.d5.actual_chg > 0) || (r.d5.pred.startsWith('DOWN') && r.d5.actual_chg < 0)) d5c++;
    }
  });
  
  const acc = (v,t) => t>0 ? (v/t*100).toFixed(1) : '—';
  d1errs.sort((a,b)=>a-b);
  const bigErrors = d1errs.filter(e=>e>10).length;
  const maxErr = d1errs.length>0 ? d1errs[d1errs.length-1].toFixed(1) : '—';
  
  s.innerHTML = 
    '<div class="sb"><div class="sl">次日(d1) 方向</div><div class="sv" style="color:#3b82f6">'+acc(d1c,d1t)+'%</div><div class="sl">'+d1c+'/'+d1t+'</div></div>'+
    '<div class="sb"><div class="sl">3日(d3) 方向</div><div class="sv" style="color:#f59e0b">'+acc(d3c,d3t)+'%</div><div class="sl">'+d3c+'/'+d3t+'</div></div>'+
    '<div class="sb"><div class="sl">5日(d5) 方向</div><div class="sv" style="color:#10b981">'+acc(d5c,d5t)+'%</div><div class="sl">'+d5c+'/'+d5t+'</div></div>'+
    '<div class="sb"><div class="sl">d1中位偏差</div><div class="sv" style="color:#f59e0b">'+(d1errs.length>0?d1errs[Math.floor(d1errs.length/2)].toFixed(1):'—')+'%</div><div class="sl">最大'+maxErr+'%</div></div>'+
    '<div class="sb"><div class="sl">偏差>10%次数</div><div class="sv" style="color:#ef4444">'+bigErrors+'</div><div class="sl">/'+n+' ('+(bigErrors/n*100).toFixed(0)+'%)</div></div>'+
    '<div class="sb"><div class="sl">回测天数</div><div class="sv" style="color:#fff">'+n+'</div><div class="sl">逐日滚动</div></div>';

  // Error bar
  const eb = document.getElementById('error-bar');
  const maxDisp = 15;
  d1errs.forEach(e => {
    const dot = document.createElement('div');
    dot.className = 'error-dot';
    const h = Math.min(e/maxDisp*100, 100);
    dot.style.height = h+'%';
    dot.style.background = e > 10 ? '#ef4444' : (e > 5 ? '#f59e0b' : '#10b981');
    dot.title = e.toFixed(1)+'%';
    eb.appendChild(dot);
  });

  // Table
  const tb = document.getElementById('tbody');
  DATA.slice().reverse().forEach(r => {
    const tr = document.createElement('tr');
    const d = r.d1.pred;
    const c = d.startsWith('UP') ? 'r' : (d.startsWith('DOWN') ? 'g' : 'm');
    const chgC = r.d1.actual_chg > 0 ? 'r' : (r.d1.actual_chg < 0 ? 'g' : 'm');
    const ok = d === 'NEUTRAL' ? '—' : (((d.startsWith('UP') && r.d1.actual_chg > 0) || (d.startsWith('DOWN') && r.d1.actual_chg < 0)) ? '✅' : '❌');
    const dev = r.d1.pred_target ? Math.abs((r.d1.actual_close - r.d1.pred_target)/r.d1.pred_target*100) : 0;
    const devStr = dev > 10 ? '<span class="r">'+dev.toFixed(1)+'%</span>' : dev.toFixed(1)+'%';
    const reason = reasonText(r);
    tr.innerHTML = '<td>'+r.date+'</td><td class="w">'+r.close+'</td><td class="'+c+'" style="font-weight:600">'+d+'</td><td class="'+c+'">'+(r.d1.pred_target||'—')+'</td><td>'+r.d1.actual_close+'</td><td class="'+chgC+'">'+(r.d1.actual_chg>=0?'+':'')+r.d1.actual_chg+'%</td><td>'+ok+'</td><td>'+devStr+'</td><td style="font-size:.7em;color:#6b7280">'+reason+'</td>';
    tb.appendChild(tr);
  });

  document.getElementById('footer').textContent = '信维通信 300136 · 融资+主力+振幅三重确认模型 · '+new Date().toLocaleString('zh-CN');
}

render();
</script>

</body>
</html>
