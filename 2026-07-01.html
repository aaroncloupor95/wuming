  return r.reasons || '综合信号';
}

function render() {
  document.getElementById('today-close').innerHTML = TODAY.close + ' <span class="today-date">'+TODAY.date+' 收盘</span>';
  
  const cards = document.getElementById('today-cards');
  const dirNames = {UP:'上涨',UP_WEAK:'偏涨',DOWN:'下跌',DOWN_WEAK:'偏跌',NEUTRAL:'方向不明'};
  const levelNames = {VERY_HIGH:'🔥 极强',HIGH:'🟢 强',MID:'🟡 中等',LOW:'🔵 弱',NONE:'⚪ 综合'};
  
  ['d1','d3','d5'].forEach(h => {
    const p = TODAY[h]; if (!p) return;
    const d = p.direction;
    const c = d.startsWith('UP') ? '#ef4444' : (d.startsWith('DOWN') ? '#10b981' : '#6b7280');
    const icon = d.startsWith('UP') ? '📈' : (d.startsWith('DOWN') ? '📉' : '➖');
    cards.innerHTML += '<div class="pc">'+
      '<div class="pdate">'+p.date_label+'</div>'+
      '<div class="pdir" style="color:'+c+'">'+icon+' '+dirNames[d]+'</div>'+
      '<div class="ptarget">🎯 目标价 <span style="color:'+c+';font-size:1.3em;font-weight:800">'+p.target+'</span></div>'+
      '<div class="pband">📏 '+p.low+' ~ '+p.high+' (±'+(p.band/2).toFixed(1)+'%)</div>'+
      '<div class="preason">'+reasonText(p)+'</div>'+
      '<div class="plevel">'+levelNames[p.level]+' · 置信'+p.conf+'%</div>'+
    '</div>';
  });

  const s = document.getElementById('stats');
  const n = DATA.length;
  let c=0;
  DATA.forEach(r => {
    if ((r.d1.pred==='UP' && r.d1.actual_chg>0) || (r.d1.pred==='DOWN' && r.d1.actual_chg<0)) c++;
  });
  const vh = DATA.filter(r=>r.d1.level==='VERY_HIGH');
  const vhc = vh.filter(r=>(r.d1.pred==='UP'&&r.d1.actual_chg>0)||(r.d1.pred==='DOWN'&&r.d1.actual_chg<0)).length;
  const hh = DATA.filter(r=>['VERY_HIGH','HIGH'].includes(r.d1.level));
  const hhc = hh.filter(r=>(r.d1.pred==='UP'&&r.d1.actual_chg>0)||(r.d1.pred==='DOWN'&&r.d1.actual_chg<0)).length;
  const acc = (v,t) => t>0 ? (v/t*100).toFixed(1) : '—';
  
  s.innerHTML = 
    '<div class="sb"><div class="sl">d1 全量</div><div class="sv" style="color:#3b82f6">'+acc(c,n)+'%</div><div class="sl">'+c+'/'+n+'</div></div>'+
    '<div class="sb"><div class="sl">d1 VERY_HIGH</div><div class="sv" style="color:#10b981">'+acc(vhc,vh.length)+'%</div><div class="sl">覆盖'+vh.length+'天</div></div>'+
    '<div class="sb"><div class="sl">d1 HIGH+</div><div class="sv" style="color:#f59e0b">'+acc(hhc,hh.length)+'%</div><div class="sl">覆盖'+hh.length+'天</div></div>'+
    '<div class="sb"><div class="sl">信号来源</div><div class="sv" style="color:#fff;font-size:1em">K线形态+主力+量价</div><div class="sl">v13</div></div>';

  const tb = document.getElementById('tbody');
  DATA.slice().reverse().forEach(r => {
    const tr = document.createElement('tr');
    const d = r.d1.pred;
    const c = d.startsWith('UP') ? 'r' : (d.startsWith('DOWN') ? 'g' : 'm');
    const chgC = r.d1.actual_chg > 0 ? 'r' : (r.d1.actual_chg < 0 ? 'g' : 'm');
    const ok = ((d==='UP'&&r.d1.actual_chg>0)||(d==='DOWN'&&r.d1.actual_chg<0)) ? '✅' : '❌';
    const dev = r.d1.pred_target ? Math.abs((r.d1.actual_close - r.d1.pred_target)/r.d1.pred_target*100) : 0;
    const devStr = dev > 10 ? '<span class="r">'+dev.toFixed(1)+'%</span>' : dev.toFixed(1)+'%';
    tr.innerHTML = '<td>'+r.date+'</td><td class="w">'+r.close+'</td><td class="'+c+'" style="font-weight:600">'+d+'</td><td class="'+c+'">'+(r.d1.pred_target||'—')+'</td><td>'+r.d1.actual_close+'</td><td class="'+chgC+'">'+(r.d1.actual_chg>=0?'+':'')+r.d1.actual_chg+'%</td><td>'+ok+'</td><td>'+devStr+'</td><td style="font-size:.68em;color:#6b7280">'+reasonText(r.d1)+'</td>';
    tb.appendChild(tr);
  });
}
render();
</script>

</body>
</html>"
